name: twintalk
description: Voice-Actuated Tracking System for Twin Rotor — ME 325 Engineering Design Project 2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking (WebSocket to Raspberry Pi)
  web_socket_channel: ^2.4.0
  http: ^1.1.0

  # Audio Recording (for Whisper ASR)
  record: ^5.0.4
  path_provider: ^2.1.1
  permission_handler: ^11.1.0

  # Charts for telemetry
  fl_chart: ^0.65.0

  # Storage
  shared_preferences: ^2.2.2

  # Utilities
  intl: ^0.18.1
  logger: ^2.0.2+1
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
